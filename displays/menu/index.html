<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0c0c0c">
<title>The Functional Plate — Nutrition Nest</title>
<style>
@font-face{font-family:'GillLight';src:url('/assets/fonts/gill-light.ttf')}
@font-face{font-family:'GillBook';src:url('/assets/fonts/gill-book.ttf')}
@font-face{font-family:'GillSemi';src:url('/assets/fonts/gill-semibold.ttf')}
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0c;--gold:#a8986a;--ink:#f1ede4;--muted:#8f897d;--card:#161514;--line:rgba(168,152,106,.28)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'GillBook',sans-serif;line-height:1.4;padding-bottom:46px;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:0 20px}
header{text-align:center;padding:42px 20px 24px}
header .logo{width:228px;height:auto;margin:0 auto 18px;display:block}
header h1{font-family:'GillLight',sans-serif;font-size:30px;font-weight:400;letter-spacing:.1em;line-height:1.15;text-transform:uppercase}
header .tag{font-family:'GillSemi',sans-serif;font-weight:400;font-size:11px;letter-spacing:.34em;color:var(--gold);margin-top:11px;text-transform:uppercase}
.rule{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:22px 0}
.concept{font-size:22px;font-style:italic;text-align:center;padding:0 4px;color:#efe9dc}
.sec-h{font-family:'GillSemi',sans-serif;font-weight:600;font-size:12px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:16px}
.how{margin-top:28px}
.steps{display:flex;flex-direction:column;gap:13px;max-width:440px;margin:0 auto}
.step{display:flex;gap:14px;align-items:flex-start}
.step .n{font-family:'GillSemi',sans-serif;color:var(--gold);font-weight:600;font-size:15px;min-width:20px;padding-top:2px}
.step p{font-size:18px;color:#d9d3c6}
.paths{margin-top:32px}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip{border:1px solid var(--line);border-radius:11px;padding:11px 10px;text-align:center}
.chip .cn{display:block;font-family:'GillSemi',sans-serif;font-weight:600;letter-spacing:.16em;color:var(--gold);font-size:13px}
.chip .cf{display:block;font-size:15px;color:var(--muted);font-style:italic;margin-top:3px}
.menu{margin-top:32px}
.menu-title{font-family:'GillLight',sans-serif;font-size:15px;letter-spacing:.36em;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:26px}
.station{margin-bottom:26px}
.station-h{font-family:'GillSemi',sans-serif;font-weight:600;font-size:12px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:15px}
.dish{background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden;margin-bottom:15px}
.dish-img{aspect-ratio:16/10;overflow:hidden;background:#000}
.dish-img img{width:100%;height:100%;object-fit:cover;display:block}
.dish-body{padding:14px 16px 16px}
.dish-body h3{font-size:24px;font-weight:600;letter-spacing:.01em;line-height:1.1}
.tags{display:flex;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap}
.path{font-family:'GillSemi',sans-serif;font-size:10px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase}
.kcal{font-family:'GillSemi',sans-serif;font-size:10px;letter-spacing:.1em;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:3px 10px;white-space:nowrap}
.benefit{font-size:18px;font-style:italic;color:#d0cabd}
.cta{margin-top:8px;border:1px solid var(--line);border-radius:14px;padding:24px 22px;text-align:center}
.cta p{font-size:21px;font-style:italic;color:#efe9dc}
footer{text-align:center;margin-top:32px;font-family:'GillSemi',sans-serif;font-size:10px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase}
.err{text-align:center;padding:80px 20px;color:var(--muted)}
</style></head>
<body><div class="wrap" id="wrap"><div class="err">Loading menu…</div></div>
<script>
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
async function render(){
  try{
    const d=await(await fetch('/content/dishes.json?t='+Date.now(),{cache:'no-store'})).json();
    const stations=[];for(const x of d.dishes)if(!stations.includes(x.station))stations.push(x.station);
    const dishCard=x=>`<article class="dish"><div class="dish-img"><img loading="lazy" src="${esc(x.img)}" alt="${esc(x.name)}"></div><div class="dish-body"><h3>${esc(x.name)}</h3><div class="tags"><span class="path">${esc(x.pathway)}</span><span class="kcal">${esc(x.kcal)} kcal</span></div><p class="benefit">${esc(x.benefit)}</p></div></article>`;
    const station=st=>`<section class="station"><h2 class="station-h">${esc(st)}</h2>${d.dishes.filter(x=>x.station===st).map(dishCard).join('')}</section>`;
    const chip=p=>`<div class="chip"><span class="cn">${esc(p.name)}</span><span class="cf">${esc(p.for)}</span></div>`;
    document.getElementById('wrap').innerHTML=`
      <header><img class="logo" src="/assets/logo/wordmark-white.png" alt="Nutrition Nest"><h1>${esc(d.brand)}</h1><div class="tag">${esc(d.tagline)}</div></header>
      <div class="rule"></div><p class="concept">${esc(d.concept)}</p>
      <section class="how"><div class="sec-h">How it works</div><div class="steps">${(d.howItWorks||[]).map((s,i)=>`<div class="step"><span class="n">${i+1}</span><p>${esc(s)}</p></div>`).join('')}</div></section>
      <section class="paths"><div class="sec-h">Choose your pathway</div><div class="chips">${(d.pathways||[]).map(chip).join('')}</div></section>
      <div class="rule"></div>
      <div class="menu"><div class="menu-title">The Menu</div>${stations.map(station).join('')}</div>
      <div class="cta"><div class="sec-h">At your table</div><p>${esc(d.cta)}</p></div>
      <footer>Nutrition Nest · Preserve Life Corp</footer>`;
  }catch(e){document.getElementById('wrap').innerHTML='<div class="err">Menu unavailable — please refresh.</div>';}
}
render();
</script></body></html>
