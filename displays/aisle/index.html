<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nutrition Nest — Aisle</title>
<style>
@font-face{font-family:'GillLight';src:url('/assets/fonts/gill-light.ttf')}
@font-face{font-family:'GillBook';src:url('/assets/fonts/gill-book.ttf')}
@font-face{font-family:'GillSemi';src:url('/assets/fonts/gill-semibold.ttf')}
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c0c;--text:#f1ede4;--muted:#8a8473;--bronze:#a8986a;--divider:#8b7b53;--line:rgba(168,152,106,.26)}
html,body{width:100vw;height:100vh;background:#000;overflow:hidden}
#scaler{position:absolute;top:0;left:0;transform-origin:top left}
.card{width:540px;height:1920px;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column;color:var(--text)}
.wmbar{display:flex;justify-content:center;padding:58px 0 0;flex-shrink:0}
.wm{width:362px;height:auto;display:block}
.content{padding:32px 40px 0 40px;flex:1;display:flex;flex-direction:column;overflow:hidden}
.num span{font-family:'GillLight';font-size:150px;line-height:.92;color:var(--bronze);display:inline-block}
.num{margin-bottom:10px;flex-shrink:0}
.title{margin-bottom:18px;flex-shrink:0}
.title span{font-family:'GillLight';font-size:78px;text-transform:uppercase;color:var(--text);line-height:1.04;letter-spacing:.03em;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.sub{margin-bottom:30px;flex-shrink:0}
.sub span{font-family:'GillSemi';font-size:34px;text-transform:uppercase;color:var(--bronze);line-height:1.1;display:block;letter-spacing:.18em}
.list{flex:1;overflow:hidden}
.list-inner{display:flex;flex-direction:column;position:relative;padding-left:28px}
.hairline{position:absolute;left:0;top:6px;bottom:0;width:1px;background:linear-gradient(to bottom,var(--divider) 0%,rgba(255,255,255,0) 100%)}
.li{font-family:'GillBook';font-size:36px;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:.5em;line-height:1.2;color:#d2cec6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.featured{flex-shrink:0;padding:26px 44px 24px;border-top:1px solid var(--line);display:flex;flex-direction:column;align-items:flex-start}
.eyebrow{font-family:'GillSemi';font-size:24px;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.badge{font-family:'GillSemi';font-size:24px;letter-spacing:2px;color:#e8dcc0;text-transform:uppercase;background:rgba(168,152,106,.12);padding:8px 17px;border-radius:3px;border:1px solid var(--divider);margin-bottom:16px}
.ptitle{font-family:'GillLight';font-size:56px;color:#fff;line-height:1.05;letter-spacing:.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bottom{height:27%;position:relative;width:100%;margin-top:auto;flex-shrink:0;overflow:hidden}
.photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background-size:cover;background-position:center center}
.photo-fade{position:absolute;left:0;right:0;top:0;height:130px;background:linear-gradient(to bottom,var(--bg) 0%,rgba(12,12,12,0) 100%);z-index:1;pointer-events:none}
.corner{position:absolute;inset:0;z-index:2;pointer-events:none;background:radial-gradient(480px 480px at 100% 100%,var(--bg) 0%,var(--bg) 31%,rgba(12,12,12,.55) 46%,rgba(12,12,12,0) 64%)}
.logo{position:absolute;bottom:38px;right:40px;z-index:10;width:142px;height:142px;display:flex;align-items:center;justify-content:center}
.logo img{width:100%;height:100%;object-fit:contain;display:block;opacity:.96;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.err{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'GillBook';font-size:30px;text-align:center;padding:40px}
</style></head>
<body>
<div id="scaler"><div class="card" id="card"></div></div>
<script>
async function L(n){try{const r=await fetch('/api/content/'+n+'?t='+Date.now(),{cache:'no-store'});if(r.ok){const j=await r.json();if(j!=null)return j;}}catch(e){}const r=await fetch('/content/'+n+'.json?t='+Date.now(),{cache:'no-store'});return r.json();}

const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const N=new URLSearchParams(location.search).get('n')||'1';
function fit(){const k=Math.min(innerWidth/540,innerHeight/1920);const s=document.getElementById('scaler');s.style.transform=`translate(${(innerWidth-540*k)/2}px,${(innerHeight-1920*k)/2}px) scale(${k})`;}
function doFit(){const t=document.getElementById('t');if(!t)return;
  // shrink the title font-size until it fits its width (handles long single words e.g. INTERNATIONAL)
  let fs=78;t.style.fontSize=fs+'px';t.style.letterSpacing='';
  while(t.scrollWidth>t.clientWidth+1&&fs>50){fs-=2;t.style.fontSize=fs+'px';}
  let lsp=3;while(t.scrollWidth>t.clientWidth+1&&lsp>-5){lsp-=1;t.style.letterSpacing=lsp+'px';}
  const sub=document.getElementById('s');let sls=Math.round(0.18*30);while(sub&&sub.scrollWidth>sub.clientWidth&&sls>-4){sls-=1;sub.style.letterSpacing=sls+'px';}}
function draw(_d){
  try{
    const all=Array.isArray(_d)?_d:(_d.aisles||[]);
    const a=all.find(x=>String(x.number)===String(N))||all[0];
    const p=a.promo||{};
    document.getElementById('card').innerHTML=`
      <div class="wmbar"><img class="wm" src="/assets/logo/wordmark-white.png" alt="Nutrition Nest"></div>
      <div class="content">
        <div class="num"><span>${esc(a.number)}</span></div>
        <div class="title"><span id="t">${esc(a.title)}</span></div>
        <div class="sub"><span id="s">${esc(a.subtitle)}</span></div>
        <div class="list"><div class="list-inner"><div class="hairline"></div>${(a.items||[]).map(t=>`<div class="li">${esc(t)}</div>`).join('')}</div></div>
      </div>
      <div class="featured">
        <span class="eyebrow">Featured</span>
        <span class="badge">${esc(p.offer)}</span>
        <span class="ptitle">${esc(p.title)}</span>
      </div>
      <div class="bottom">
        ${/\.(mp4|webm|mov)(\?|$)/i.test(p.image||'')?`<video class="photo" src="${esc(p.image)}" autoplay loop muted playsinline></video>`:`<div class="photo" style="${p.image?`background-image:url('${esc(p.image)}')`:''}"></div>`}
        <div class="photo-fade"></div><div class="corner"></div>
        <div class="logo"><img src="/assets/logo/brandmark-white.png" alt="n"></div>
      </div>`;
    doFit();fit();
    const v=document.querySelector('video.photo');if(v){v.muted=true;v.play().catch(()=>{});}
  }catch(e){document.getElementById('card').innerHTML=`<div class="err">content unavailable — retrying…</div>`;}
}
let lastHash='';
async function poll(){try{const _d=await L('aisles');const h=JSON.stringify(_d);if(h!==lastHash){lastHash=h;draw(_d);}}catch(e){}}
addEventListener('resize',fit);
(async()=>{ if(document.fonts&&document.fonts.ready){try{await document.fonts.ready;}catch(e){}} await poll(); })();
setInterval(poll,5000);                     // pick up admin edits within ~5s, re-render only when content changed (no flicker)
setInterval(async()=>{try{const r=await fetch(location.pathname+'?p='+Date.now(),{method:'HEAD',cache:'no-store'});if(r&&r.ok)location.reload();}catch(e){/* site unreachable — DON'T reload, keep showing last content so an outage never blanks the panel */}},300000);
</script></body></html>
