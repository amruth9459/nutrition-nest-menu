<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nutrition Nest — The Functional Plate</title>
<style>
@font-face{font-family:'GillLight';src:url('/assets/fonts/gill-light.ttf')}
@font-face{font-family:'GillBook';src:url('/assets/fonts/gill-book.ttf')}
@font-face{font-family:'GillSemi';src:url('/assets/fonts/gill-semibold.ttf')}
:root{--bg:#0c0c0c;--gold:#a8986a;--gold-dk:#8b7b53;--text:#f1ede4;--muted:#b9b3a4;--cream:#e6dcc2}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;background:#000;overflow:hidden}
#scaler{position:absolute;top:0;left:0;transform-origin:top left}
.stage{position:relative;width:3840px;height:2160px;background:var(--bg);overflow:hidden}
.layer{position:absolute;inset:0;opacity:0;transition:opacity .8s ease}
.layer.on{opacity:1}
.dish-photo{position:absolute;inset:0;background-color:#0c0c0c;background-repeat:no-repeat;background-size:cover;background-position:center center;z-index:1}
.scrim-bottom{position:absolute;left:0;right:0;bottom:0;height:1180px;z-index:2;background:linear-gradient(to top,rgba(8,8,8,0.97) 0%,rgba(8,8,8,0.95) 12%,rgba(8,8,8,0.88) 24%,rgba(8,8,8,0.66) 42%,rgba(8,8,8,0.34) 64%,rgba(8,8,8,0.00) 100%)}
.scrim-text{position:absolute;left:0;bottom:0;width:1980px;height:980px;z-index:3;background:radial-gradient(122% 100% at 15% 84%,rgba(8,8,8,0.93) 0%,rgba(8,8,8,0.80) 28%,rgba(8,8,8,0.50) 50%,rgba(8,8,8,0.20) 70%,rgba(8,8,8,0.00) 86%)}
.scrim-top{position:absolute;left:0;right:0;top:0;height:520px;z-index:2;background:linear-gradient(to bottom,rgba(8,8,8,0.62) 0%,rgba(8,8,8,0.28) 45%,rgba(8,8,8,0.00) 100%)}
.vignette{position:absolute;inset:0;z-index:2;background:radial-gradient(115% 100% at 50% 42%,rgba(0,0,0,0) 55%,rgba(0,0,0,0.30) 100%),linear-gradient(to left,rgba(0,0,0,0.24) 0%,rgba(0,0,0,0.06) 22%,rgba(0,0,0,0.00) 46%)}
.frame-rule{display:none}
.crest{position:absolute;top:92px;left:104px;z-index:7;display:flex;align-items:center;gap:34px}
.crest .bm{height:106px;width:auto;display:block}
.crest .wm{height:60px;width:auto;display:block}
.dish-block{position:absolute;left:150px;bottom:150px;z-index:8;max-width:2820px}
.dish-name{font-family:'GillLight';font-size:168px;line-height:1.0;color:var(--text);letter-spacing:0.01em;max-width:2820px;text-shadow:0 4px 40px rgba(0,0,0,0.55);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meta-row{display:flex;align-items:center;gap:46px;margin-top:54px}
.pathway{font-family:'GillSemi';font-size:60px;letter-spacing:0.22em;text-transform:uppercase;color:#15120a;background:var(--gold);padding:18px 48px 14px;border-radius:999px;line-height:1.0}
.kcal{font-family:'GillSemi';font-size:60px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);line-height:1.0;text-shadow:0 2px 16px rgba(0,0,0,0.7)}
.kcal .dot{color:var(--muted);margin-right:6px}
.benefit{font-family:'GillBook';font-size:78px;line-height:1.1;color:var(--cream);max-width:2680px;margin-top:50px;text-shadow:0 3px 26px rgba(0,0,0,0.78);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.benefit .tick{display:inline-block;width:72px;height:5px;background:var(--gold);border-radius:3px;vertical-align:middle;margin-right:34px;margin-bottom:14px}
.teach-bg{position:absolute;inset:0;z-index:1;background:radial-gradient(140% 110% at 50% 28%,#1a1916 0%,#121210 50%,#0a0a09 100%)}
.wrap{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:200px 220px}
.bigwm{height:256px;width:auto;display:block;margin-bottom:60px}
.brand-title{font-family:'GillLight';font-size:166px;line-height:1.0;color:var(--text);letter-spacing:0.03em;text-transform:uppercase;margin:0;max-width:3400px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hr{width:760px;height:2px;background:var(--gold);opacity:0.85;margin:58px 0 50px}
.tagline{font-family:'GillSemi';font-size:58px;letter-spacing:0.42em;text-transform:uppercase;color:var(--muted);padding-left:0.42em}
.concept{font-family:'GillBook';font-size:74px;line-height:1.12;color:var(--cream);max-width:2900px;margin-top:48px}
.pnames{display:flex;flex-wrap:nowrap;justify-content:center;margin-top:88px;max-width:3560px}
.pname{font-family:'GillSemi';font-size:48px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);padding:0 28px;white-space:nowrap}
.pname+.pname{border-left:1px solid rgba(168,152,106,0.40)}
.eyebrow{font-family:'GillSemi';font-size:56px;letter-spacing:0.44em;text-transform:uppercase;color:var(--gold);margin-bottom:44px;padding-left:0.44em}
.heading{font-family:'GillLight';font-size:166px;line-height:1.0;color:var(--text);letter-spacing:0.03em;text-transform:uppercase;max-width:3400px}
.steps{display:flex;flex-direction:column;gap:78px;margin-top:108px;width:100%;max-width:3100px}
.step{display:flex;align-items:center;gap:74px;text-align:left}
.step-num{flex:0 0 auto;width:168px;height:168px;display:flex;align-items:center;justify-content:center;border:3px solid var(--gold);border-radius:50%;font-family:'GillLight';font-size:104px;color:var(--gold)}
.step-text{font-family:'GillBook';font-size:96px;line-height:1.08;color:var(--text)}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:64px 96px;margin-top:104px;width:100%;max-width:3360px}
.pcell{display:flex;flex-direction:column;align-items:flex-start;text-align:left;padding:40px 44px;border-radius:14px;background:rgba(168,152,106,0.06)}
.pcell .nm{font-family:'GillSemi';font-size:76px;letter-spacing:0.10em;text-transform:uppercase;color:var(--gold);margin-bottom:28px}
.pcell .ds{font-family:'GillBook';font-size:62px;line-height:1.08;color:var(--muted)}
.cta-line{font-family:'GillBook';font-size:98px;line-height:1.1;color:var(--cream);max-width:3000px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.crule{width:620px;height:2px;background:var(--gold);opacity:0.85;margin:78px 0 70px}
.cconcept{font-family:'GillLight';font-size:150px;line-height:1.04;color:var(--text);letter-spacing:0.02em;max-width:3200px}
</style></head>
<body>
<div id="scaler"><div class="stage"><div class="layer" id="A"></div><div class="layer" id="B"></div></div></div>
<script>
async function L(n){try{const r=await fetch('/api/content/'+n+'?t='+Date.now(),{cache:'no-store'});if(r.ok){const j=await r.json();if(j!=null)return j;}}catch(e){}const r=await fetch('/content/'+n+'.json?t='+Date.now(),{cache:'no-store'});return r.json();}

const BM='/assets/logo/brandmark-white.png',WM='/assets/logo/wordmark-white.png';
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const crest=`<div class="crest"><img class="bm" src="${BM}" alt=""><img class="wm" src="${WM}" alt="Nutrition Nest"></div>`;
function fit(){const k=Math.min(innerWidth/3840,innerHeight/2160);const s=document.getElementById('scaler');s.style.transform=`translate(${(innerWidth-3840*k)/2}px,${(innerHeight-2160*k)/2}px) scale(${k})`;}
function dish(d){return `<div class="dish-photo" style="background-image:url('${esc(d.img)}')"></div><div class="scrim-top"></div><div class="vignette"></div><div class="scrim-bottom"></div><div class="scrim-text"></div><div class="frame-rule"></div>${crest}<div class="dish-block"><h1 class="dish-name">${esc(d.name)}</h1><div class="meta-row"><span class="pathway">${esc((d.pathway||'').toUpperCase())}</span><span class="kcal"><span class="dot">·</span>${esc(d.kcal)} KCAL</span></div>${d.benefit?`<div class="benefit"><span class="tick"></span>${esc(d.benefit)}</div>`:''}</div>`;}
function intro(D){return `<div class="teach-bg"></div><div class="frame-rule"></div><div class="wrap"><img class="bigwm" src="${WM}" alt="Nutrition Nest"><h1 class="brand-title">${esc(D.brand)}</h1><div class="hr"></div><div class="tagline">${esc(D.tagline)}</div>${D.concept?`<div class="concept">${esc(D.concept)}</div>`:''}<div class="pnames">${(D.pathways||[]).map(p=>`<span class="pname">${esc(p.name)}</span>`).join('')}</div></div>`;}
function how(D){return `<div class="teach-bg"></div>${crest}<div class="frame-rule"></div><div class="wrap"><div class="eyebrow">THREE SIMPLE STEPS</div><h1 class="heading">HOW IT WORKS</h1><div class="steps">${(D.howItWorks||[]).map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${esc(s)}</div></div>`).join('')}</div></div>`;}
function paths(D){return `<div class="teach-bg"></div>${crest}<div class="frame-rule"></div><div class="wrap"><div class="eyebrow">CHOOSE HOW YOU WANT TO FEEL</div><h1 class="heading">EIGHT WELLNESS PATHWAYS</h1><div class="pgrid">${(D.pathways||[]).map(p=>`<div class="pcell"><div class="nm">${esc(p.name)}</div><div class="ds">${esc(p.for)}</div></div>`).join('')}</div></div>`;}
function cta(D){return `<div class="teach-bg"></div><div class="frame-rule"></div><div class="wrap"><img class="bigwm" src="${WM}" alt="Nutrition Nest"><h1 class="cconcept">${esc(D.concept)}</h1><div class="crule"></div><div class="cta-line">${esc(D.cta)}</div></div>`;}
let frames=[],idx=0,cur=0,layers;
async function load(){const D=await L('dishes');frames=[intro(D),...D.dishes.map(dish),how(D),paths(D),cta(D)];}
function tick(){const n=layers[1-cur];n.innerHTML=frames[idx%frames.length];n.classList.add('on');layers[cur].classList.remove('on');cur=1-cur;idx++;}
addEventListener('resize',fit);
(async()=>{layers=[document.getElementById('A'),document.getElementById('B')];if(document.fonts&&document.fonts.ready){try{await document.fonts.ready;}catch(e){}}await load();fit();tick();setInterval(tick,5600);setInterval(load,120000);})();
</script></body></html>
